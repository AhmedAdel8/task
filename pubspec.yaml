name: task
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  app_settings: ^7.0.0
  cached_network_image: ^3.3.1
  carousel_slider: ^5.1.1
  coupon_uikit: ^0.2.1
