  moyasar: ^2.1.3
  network_info_plus: ^7.0.0
  package_info_plus: ^9.0.0
  page_transition: ^2.1.0
  pinput: ^6.0.1
  pretty_dio_logger: ^1.3.1
  retrofit: ^4.9.0
  shared_preferences: ^2.5.4
  skeletonizer: ^2.1.0+1
  top_snackbar_flutter: ^3.1.0
  url_launcher: ^6.3.2
